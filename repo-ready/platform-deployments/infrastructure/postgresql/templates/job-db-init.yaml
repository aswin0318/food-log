# =============================================================================
# Job: PostgreSQL DB init
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-db-init
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.postgresql.name }}
    app.kubernetes.io/name: {{ .Values.postgresql.name }}
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
    app.kubernetes.io/component: db-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: {{ .Values.postgresql.name }}
        app.kubernetes.io/name: {{ .Values.postgresql.name }}
        app.kubernetes.io/part-of: {{ .Values.global.appName }}
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "[wait] Waiting for PostgreSQL to accept connections..."
              until pg_isready \
                -h {{ .Values.postgresql.name }}.{{ .Values.global.namespace }}.svc.cluster.local \
                -p {{ .Values.postgresql.port }} \
                -U "$POSTGRES_USER"; do
                echo "[wait] PostgreSQL not ready yet. Retrying in 5s..."
                sleep 5
              done
              echo "[wait] PostgreSQL is ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
      containers:
        - name: db-init
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - /bin/bash
            - /scripts/init.sh
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGHOST
              value: "{{ .Values.postgresql.name }}.{{ .Values.global.namespace }}.svc.cluster.local"
            - name: PGPORT
              value: "{{ .Values.postgresql.port }}"
            - name: AUTH_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: AUTH_USER_PASSWORD
            - name: FOOD_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: FOOD_USER_PASSWORD
            - name: MACRO_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: MACRO_USER_PASSWORD
            - name: COMPLIANCE_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: COMPLIANCE_USER_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /scripts
      volumes:
        - name: init-script
          configMap:
            name: postgresql-init-script
            defaultMode: 0755
