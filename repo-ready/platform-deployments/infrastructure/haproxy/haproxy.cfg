# ──────────────────────────────────────────────────────────────────────────────
# HAProxy Configuration for Kubernetes Production
# ──────────────────────────────────────────────────────────────────────────────
# Deployed on a SEPARATE EC2 instance (public-facing entry point).
# Traffic flow: Internet → HAProxy (TLS) → Envoy Gateway → K8s Services
#
# This config proxies ALL traffic to the Envoy Gateway service.
# Path-based routing is handled by Envoy Gateway HTTPRoute resources.
# ──────────────────────────────────────────────────────────────────────────────

global
    log         /dev/log local0
    log         /dev/log local1 notice
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     4096
    user        haproxy
    group       haproxy
    daemon

    # SSL configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options prefer-client-ciphers no-sslv3 no-tlsv10 no-tlsv11
    tune.ssl.default-dh-param 2048

defaults
    log                 global
    mode                http
    option              httplog
    option              dontlognull
    option              http-server-close
    option              forwardfor except 127.0.0.0/8
    timeout connect     5000ms
    timeout client      50000ms
    timeout server      50000ms
    retries             3
    default-server      init-addr last,libc,none

# ── Frontend: HTTP (Redirect to HTTPS) ──────────────────────────────────────

frontend http-in
    bind *:80
    # Uncomment the following line when TLS cert is available:
    # redirect scheme https code 301 if !{ ssl_fc }
    default_backend envoy_gateway

# ── Frontend: HTTPS ──────────────────────────────────────────────────────────

# Uncomment when TLS certificate is available:
# frontend https-in
#     bind *:443 ssl crt /etc/haproxy/certs/nutritrack.example.com.pem
#     http-request set-header X-Forwarded-Proto https
#     http-request set-header X-Real-IP %[src]
#     http-request set-header X-Forwarded-For %[src]
#     default_backend envoy_gateway

# ── Backend: Envoy Gateway ──────────────────────────────────────────────────

backend envoy_gateway
    balance roundrobin
    option httpchk GET /
    http-check expect status 200

    # Replace <ENVOY_GATEWAY_NODE_IP> and <ENVOY_GATEWAY_NODEPORT> with:
    #
    # To find the Envoy Gateway service:
    #   kubectl get svc -n nutritrack \
    #     -l gateway.envoyproxy.io/owning-gateway-name=nutritrack-gateway
    #
    # Use the NodePort IP:Port of the Envoy Gateway proxy service.

    server envoy1 <ENVOY_GATEWAY_NODE_IP>:<ENVOY_GATEWAY_NODEPORT> check inter 5s fall 3 rise 2
    # Add more servers for HA:
    # server envoy2 <NODE2_IP>:<NODEPORT> check inter 5s fall 3 rise 2

# ── Stats Page ───────────────────────────────────────────────────────────────

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:changeme
