---
# Frontend Route: / → frontend-service:3000
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: nutritrack-dev
spec:
  parentRefs:
    - name: nutritrack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 3000

