---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Values.gateway.namespace | default .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.frontend.routePrefix }}
      backendRefs:
        - name: {{ .Values.frontend.name }}
          port: {{ .Values.frontend.port }}

