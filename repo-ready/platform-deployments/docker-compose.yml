# =============================================================================
# NutriTrack — Docker Compose (EC2 Testing)
# =============================================================================
# Usage:
#   1. Update .env with your passwords
#   2. Build images: docker compose build
#   3. Start all services: docker compose up -d
#   4. Test: curl http://<EC2_IP>:8000/api/auth/health
#   5. Stop: docker compose down
#   6. Stop + delete volumes: docker compose down -v
# =============================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: nutritrack-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      FOOD_DB_NAME: ${FOOD_DB_NAME}
      FOOD_DB_USER: ${FOOD_DB_USER}
      FOOD_DB_PASSWORD: ${FOOD_DB_PASSWORD}
      MACRO_DB_NAME: ${MACRO_DB_NAME}
      MACRO_DB_USER: ${MACRO_DB_USER}
      MACRO_DB_PASSWORD: ${MACRO_DB_PASSWORD}
      COMPLIANCE_DB_NAME: ${COMPLIANCE_DB_NAME}
      COMPLIANCE_DB_USER: ${COMPLIANCE_DB_USER}
      COMPLIANCE_DB_PASSWORD: ${COMPLIANCE_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/docker-init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nutritrack

  # ── Auth Service ───────────────────────────────────────────────────────────
  auth-service:
    image: ${AUTH_IMAGE}
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    container_name: nutritrack-auth
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      APP_NAME: "Auth Service"
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@postgresql:5432/${AUTH_DB_NAME}"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    networks:
      - nutritrack

  # ── Food Logging Service ──────────────────────────────────────────────────
  food-service:
    image: ${FOOD_IMAGE}
    build:
      context: ../food-service
      dockerfile: Dockerfile
    container_name: nutritrack-food
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      APP_NAME: "Food Logging Service"
      HOST: "0.0.0.0"
      PORT: "8001"
      DATABASE_URL: "postgresql+asyncpg://${FOOD_DB_USER}:${FOOD_DB_PASSWORD}@postgresql:5432/${FOOD_DB_NAME}"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8001:8001"
    networks:
      - nutritrack

  # ── Macro Calculation Service ──────────────────────────────────────────────
  macro-service:
    image: ${MACRO_IMAGE}
    build:
      context: ../macro-service
      dockerfile: Dockerfile
    container_name: nutritrack-macro
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      food-service:
        condition: service_started
      auth-service:
        condition: service_started
    environment:
      APP_NAME: "Macro Calculation Service"
      HOST: "0.0.0.0"
      PORT: "8002"
      DATABASE_URL: "postgresql+asyncpg://${MACRO_DB_USER}:${MACRO_DB_PASSWORD}@postgresql:5432/${MACRO_DB_NAME}"
      JWT_SECRET: ${JWT_SECRET}
      FOOD_SERVICE_URL: "http://food-service:8001"
      AUTH_SERVICE_URL: "http://auth-service:8000"
    ports:
      - "8002:8002"
    networks:
      - nutritrack

  # ── Compliance & Alert Service ─────────────────────────────────────────────
  compliance-service:
    image: ${COMPLIANCE_IMAGE}
    build:
      context: ../compliance-service
      dockerfile: Dockerfile
    container_name: nutritrack-compliance
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      macro-service:
        condition: service_started
    environment:
      APP_NAME: "Compliance & Alert Service"
      HOST: "0.0.0.0"
      PORT: "8003"
      DATABASE_URL: "postgresql+asyncpg://${COMPLIANCE_DB_USER}:${COMPLIANCE_DB_PASSWORD}@postgresql:5432/${COMPLIANCE_DB_NAME}"
      JWT_SECRET: ${JWT_SECRET}
      MACRO_SERVICE_URL: "http://macro-service:8002"
    ports:
      - "8003:8003"
    networks:
      - nutritrack

  # ── Frontend (Vite + Nginx) ─────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: nutritrack-frontend
    restart: unless-stopped
    depends_on:
      - auth-service
      - food-service
      - macro-service
      - compliance-service
    ports:
      - "3000:3000"
    networks:
      - nutritrack

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  nutritrack:
    driver: bridge
