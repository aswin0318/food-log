apiVersion: v1
kind: Service
metadata:
  name: food-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: food-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.foodService.port }}
      targetPort: {{ .Values.foodService.port }}
      protocol: TCP
      name: http
  selector:
    app: food-service
