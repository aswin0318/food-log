apiVersion: v1
kind: Service
metadata:
  name: compliance-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: compliance-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.complianceService.port }}
      targetPort: {{ .Values.complianceService.port }}
      protocol: TCP
      name: http
  selector:
    app: compliance-service
